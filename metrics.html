<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cognitive Portfolio — Socra</title>
  <link rel="icon" type="image/png" href="assets/small-logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="nav">
    <a href="index.html" class="nav-logo"><img src="assets/main-logo.png" alt="Socra"></a>
    <div class="nav-links"><a href="app.html" class="nav-link">Back to App</a></div>
  </nav>
  <section class="metrics-page">
    <div class="metrics-container">
      <a href="app.html" class="metrics-back"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>Back to Chat</a>
      <h1 style="font-size:28px;font-weight:700;color:var(--navy);margin-bottom:8px;">Cognitive Portfolio</h1>
      <p style="color:var(--text-secondary);margin-bottom:32px;max-width:500px;">Track your intellectual growth over time. These metrics reflect how your reasoning evolves with every session.</p>
      <div class="metrics-summary" id="metrics-summary">
        <div class="metric-card"><div class="metric-value" id="metric-reasoning">—</div><div class="metric-label">Reasoning</div><div class="metric-bar"><div class="metric-bar-fill" id="bar-reasoning" style="width:0%"></div></div></div>
        <div class="metric-card"><div class="metric-value" id="metric-consistency">—</div><div class="metric-label">Consistency</div><div class="metric-bar"><div class="metric-bar-fill" id="bar-consistency" style="width:0%"></div></div></div>
        <div class="metric-card"><div class="metric-value" id="metric-completeness">—</div><div class="metric-label">Completeness</div><div class="metric-bar"><div class="metric-bar-fill" id="bar-completeness" style="width:0%"></div></div></div>
        <div class="metric-card"><div class="metric-value" id="metric-originality">—</div><div class="metric-label">Originality</div><div class="metric-bar"><div class="metric-bar-fill" id="bar-originality" style="width:0%"></div></div></div>
        <div class="metric-card"><div class="metric-value" id="metric-confidence">—</div><div class="metric-label">Confidence</div><div class="metric-bar"><div class="metric-bar-fill" id="bar-confidence" style="width:0%"></div></div></div>
      </div>
      <div class="metrics-chart-area">
        <h3>Reasoning Progress Over Time</h3>
        <div class="metrics-chart-container"><canvas id="metrics-chart"></canvas></div>
      </div>
      <div class="metrics-stats">
        <div class="metrics-stat-card"><div class="metrics-stat-label">Total Sessions</div><div class="metrics-stat-value" id="metric-sessions">0</div></div>
        <div class="metrics-stat-card"><div class="metrics-stat-label">Avg. Struggle Level</div><div class="metrics-stat-value" id="metric-struggle">—</div></div>
      </div>
    </div>
  </section>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="js/supabase-client.js"></script>
  <script>
    window.addEventListener('supabase-ready',async()=>{
      if(!sb){window.location.href='auth.html';return;}
      const{data:{session}}=await sb.auth.getSession();
      if(!session){window.location.href='auth.html';return;}
      const{data,error}=await sb.from('cognitive_metrics').select('*').eq('user_id',session.user.id).order('date',{ascending:false}).limit(30);
      const metrics=data||[];
      if(!metrics.length)return;
      const latest=metrics[0];
      const fields={reasoning:'reasoning_quality',consistency:'logical_consistency',completeness:'completeness',originality:'originality',confidence:'confidence_alignment'};
      Object.entries(fields).forEach(([k,f])=>{const val=latest[f]||0;document.getElementById('metric-'+k).textContent=val.toFixed(1);document.getElementById('bar-'+k).style.width=(val*10)+'%';});
      document.getElementById('metric-sessions').textContent=latest.session_count||0;
      document.getElementById('metric-struggle').textContent=latest.avg_struggle_level?latest.avg_struggle_level.toFixed(1):'—';
      const cd=[...metrics].reverse();
      const labels=cd.map(d=>new Date(d.date).toLocaleDateString('en-US',{month:'short',day:'numeric'}));
      new Chart(document.getElementById('metrics-chart'),{
        type:'line',
        data:{labels,datasets:[
          {label:'Reasoning',data:cd.map(d=>d.reasoning_quality),borderColor:'#1B2A4A',backgroundColor:'rgba(27,42,74,0.08)',fill:true,tension:0.3,pointRadius:3,borderWidth:2},
          {label:'Consistency',data:cd.map(d=>d.logical_consistency),borderColor:'#C9A84C',backgroundColor:'rgba(201,168,76,0.08)',fill:false,tension:0.3,pointRadius:3,borderWidth:2},
          {label:'Originality',data:cd.map(d=>d.originality),borderColor:'#2D8A56',fill:false,tension:0.3,pointRadius:3,borderWidth:2}
        ]},
        options:{responsive:true,maintainAspectRatio:false,
          scales:{y:{min:0,max:10,grid:{color:'#E2E5EA'},ticks:{font:{family:'Inter',size:11},color:'#8D96A5'}},x:{grid:{display:false},ticks:{font:{family:'Inter',size:11},color:'#8D96A5'}}},
          plugins:{legend:{position:'bottom',labels:{font:{family:'Inter',size:12},color:'#5A6577',usePointStyle:true,padding:16}}}
        }
      });
    });
  </script>
</body>
</html>
