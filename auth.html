<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — Socra</title>
  <link rel="icon" type="image/png" href="assets/small-logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-container">
      <div class="auth-logo"><a href="index.html"><img src="assets/main-logo.png" alt="Socra"></a></div>
      <div class="auth-card">
        <div class="auth-tabs">
          <button class="auth-tab active" data-tab="signup">Sign Up</button>
          <button class="auth-tab" data-tab="login">Log In</button>
        </div>
        <form class="auth-form" id="signup-form">
          <div class="form-group"><label for="signup-name">Name</label><input type="text" id="signup-name" class="form-input" placeholder="Your full name" required autocomplete="name"></div>
          <div class="form-group"><label for="signup-email">Email</label><input type="email" id="signup-email" class="form-input" placeholder="you@example.com" required autocomplete="email"></div>
          <div class="form-group"><label for="signup-password">Password</label><div class="form-input-wrapper"><input type="password" id="signup-password" class="form-input" placeholder="At least 6 characters" required autocomplete="new-password" minlength="6"><button type="button" class="password-toggle" data-target="signup-password"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></div></div>
          <div class="form-group"><label for="signup-confirm">Confirm Password</label><div class="form-input-wrapper"><input type="password" id="signup-confirm" class="form-input" placeholder="Re-enter your password" required autocomplete="new-password"><button type="button" class="password-toggle" data-target="signup-confirm"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></div></div>
          <div class="form-error hidden" id="signup-error"></div>
          <button type="submit" class="btn btn-primary" style="width:100%;padding:12px;">Create Account</button>
        </form>
        <form class="auth-form hidden" id="login-form">
          <div class="form-group"><label for="login-email">Email</label><input type="email" id="login-email" class="form-input" placeholder="you@example.com" required autocomplete="email"></div>
          <div class="form-group"><label for="login-password">Password</label><div class="form-input-wrapper"><input type="password" id="login-password" class="form-input" placeholder="Your password" required autocomplete="current-password"><button type="button" class="password-toggle" data-target="login-password"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></div></div>
          <div class="form-error hidden" id="login-error"></div>
          <button type="submit" class="btn btn-primary" style="width:100%;padding:12px;">Log In</button>
        </form>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script>
    window.addEventListener('supabase-ready',async()=>{
      if(!sb)return;
      const{data:{session}}=await sb.auth.getSession();
      if(session){window.location.href='app.html';return;}
      const tabs=document.querySelectorAll('.auth-tab'),sf=document.getElementById('signup-form'),lf=document.getElementById('login-form');
      tabs.forEach(t=>t.addEventListener('click',()=>{tabs.forEach(x=>x.classList.remove('active'));t.classList.add('active');if(t.dataset.tab==='signup'){sf.classList.remove('hidden');lf.classList.add('hidden');}else{lf.classList.remove('hidden');sf.classList.add('hidden');}}));
      document.querySelectorAll('.password-toggle').forEach(b=>b.addEventListener('click',()=>{const i=document.getElementById(b.dataset.target);const p=i.type==='password';i.type=p?'text':'password';b.innerHTML=p?'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>':'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';}));
      sf.addEventListener('submit',async e=>{e.preventDefault();const err=document.getElementById('signup-error');err.classList.add('hidden');const n=document.getElementById('signup-name').value.trim(),em=document.getElementById('signup-email').value.trim(),pw=document.getElementById('signup-password').value,cf=document.getElementById('signup-confirm').value;if(pw!==cf){err.textContent='Passwords do not match.';err.classList.remove('hidden');return;}if(pw.length<6){err.textContent='Password must be at least 6 characters.';err.classList.remove('hidden');return;}const{data,error}=await sb.auth.signUp({email:em,password:pw,options:{data:{name:n}}});if(error){err.textContent=error.message;err.classList.remove('hidden');return;}if(data.user)window.location.href='app.html';});
      lf.addEventListener('submit',async e=>{e.preventDefault();const err=document.getElementById('login-error');err.classList.add('hidden');const em=document.getElementById('login-email').value.trim(),pw=document.getElementById('login-password').value;const{error}=await sb.auth.signInWithPassword({email:em,password:pw});if(error){err.textContent=error.message;err.classList.remove('hidden');return;}window.location.href='app.html';});
    });
  </script>
</body>
</html>
