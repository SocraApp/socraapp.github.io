<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Socra — Think</title>
  <link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png">
  <link rel="icon" type="image/png" sizes="64x64" href="/assets/favicon-64.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo-full" id="sidebar-logo-full"><img src="/assets/small-logo.png" alt="Socra"></div>
        <div class="sidebar-logo-small" id="sidebar-logo-small"><img src="/assets/small-logo.png" alt="Socra"></div>
        <div class="sidebar-actions">
          <button class="sidebar-icon-btn" id="search-toggle" title="Search chats"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg></button>
          <button class="sidebar-icon-btn" id="sidebar-toggle" title="Collapse sidebar"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg></button>
        </div>
      </div>
      <button class="new-chat-btn active" id="new-chat-btn"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg><span>New Chat</span></button>
      <a href="/metrics.html" class="sidebar-link-btn" id="metrics-link"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10"></path><path d="M12 20V4"></path><path d="M6 20v-6"></path></svg><span>Cognitive Portfolio</span></a>
      <div class="sidebar-divider"></div>
      <div class="chat-history" id="chat-history">
        <div class="chat-history-empty" id="chat-history-empty">Start a new chat to begin your Socratic journey.</div>
        <button class="sidebar-upgrade-btn" id="upgrade-btn"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg><span>Upgrade Plan</span></button>
      </div>
      <div class="sidebar-profile">
        <div class="profile-info" id="profile-info">
          <div class="profile-avatar" id="profile-avatar">?</div>
          <div class="profile-details"><div class="profile-name" id="profile-name">Loading...</div><div class="profile-plan" id="profile-plan">Doxa</div></div>
        </div>
        <button class="logout-btn full-width" id="logout-btn"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>Log Out</button>
      </div>
    </aside>
    <main class="main-content">
      <div class="top-bar">
        <div class="top-bar-left">
          <button class="sidebar-icon-btn" id="mobile-menu-btn" style="display:none;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg></button>
          <button class="reopen-workspace-btn hidden" id="reopen-workspace-btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>Reopen Document</button>
        </div>
        <div class="top-bar-right"></div>
      </div>
      <div class="workspace-chat-split" id="workspace-chat-split">
        <div class="workspace-panel hidden" id="workspace-panel">
          <div class="workspace-header"><input type="text" class="workspace-title-input" id="workspace-title" placeholder="Document title" value="Untitled Document"><div class="workspace-actions"><button class="workspace-action-btn" id="close-workspace" title="Close workspace"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button></div></div>
          <div class="format-bar">
            <select class="format-select" id="format-heading"><option value="">Heading</option><option value="1">H1</option><option value="2">H2</option><option value="3">H3</option><option value="4">H4</option><option value="5">H5</option><option value="6">H6</option></select>
            <div class="format-divider"></div>
            <button class="format-btn" data-format="bold" title="Bold"><b>B</b></button>
            <button class="format-btn" data-format="italic" title="Italic"><i>I</i></button>
            <div class="format-divider"></div>
            <button class="format-btn" data-format="code-inline" title="Inline code">&lt;/&gt;</button>
            <button class="format-btn" data-format="code-block" title="Code block">{}</button>
            <div class="format-divider"></div>
            <button class="format-btn" data-format="latex-inline" title="Inline LaTeX">$</button>
            <button class="format-btn" data-format="latex-display" title="Display LaTeX">$$</button>
            <div class="format-divider"></div>
            <button class="format-btn" data-format="question" title="Ask Socra">?</button>
          </div>
          <div class="editor-split">
            <!-- Live editor replaces the old split textarea+preview -->
          </div>
        </div>
        <div class="chat-panel" id="chat-panel">
          <div class="chat-messages" id="chat-messages">
            <div class="welcome-screen" id="welcome-screen">
              <div class="welcome-icon"><img src="/assets/small-logo.png" alt="Socra"></div>
              <img class="welcome-wordmark-img" id="welcome-heading" src="/assets/text-logo.png" alt="Socra">
              <div class="welcome-wordmark" hidden>Socra</div>
              <div class="welcome-subtitle" id="welcome-text" hidden></div>
              <div class="welcome-composer">
                <div class="welcome-composer-wrapper">
                  <textarea class="welcome-composer-input" id="welcome-composer-input" placeholder="Share your thoughts... Socra will guide your reasoning." rows="1"></textarea>
                  <div class="welcome-composer-btn-row">
                    <button class="welcome-composer-btn" id="welcome-send-btn" disabled title="Send"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg></button>
                  </div>
                </div>
                <div class="welcome-model-row">
                  <div class="model-selector" id="welcome-model-selector">
                    <button class="model-selector-btn" id="welcome-model-selector-btn">
                      <span class="model-selector-dot"></span>
                      <span class="model-selector-label" id="welcome-model-selector-label">Doxa</span>
                      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"></polyline></svg>
                    </button>
                    <div class="model-selector-dropdown" id="welcome-model-selector-dropdown">
                      <button class="model-option active" data-model="doxa"><span class="model-option-dot low"></span><span class="model-option-info"><strong>Doxa</strong> <span class="model-tier">Low</span></span></button>
                      <button class="model-option locked" data-model="elenchus"><span class="model-option-dot med"></span><span class="model-option-info"><strong>Elenchus</strong> <span class="model-tier">Medium</span></span><span class="model-lock-icon" title="Upgrade"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg></span></button>
                      <button class="model-option locked" data-model="nous"><span class="model-option-dot high"></span><span class="model-option-info"><strong>Nous</strong> <span class="model-tier">High</span></span><span class="model-lock-icon" title="Upgrade"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg></span></button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="composer-area">
            <div class="composer-top-row">
              <div class="model-selector" id="model-selector">
                <button class="model-selector-btn" id="model-selector-btn">
                  <span class="model-selector-dot"></span>
                  <span class="model-selector-label" id="model-selector-label">Doxa</span>
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"></polyline></svg>
                </button>
                <div class="model-selector-dropdown" id="model-selector-dropdown">
                  <button class="model-option active" data-model="doxa"><span class="model-option-dot low"></span><span class="model-option-info"><strong>Doxa</strong> <span class="model-tier">Low</span></span></button>
                  <button class="model-option locked" data-model="elenchus"><span class="model-option-dot med"></span><span class="model-option-info"><strong>Elenchus</strong> <span class="model-tier">Medium</span></span><span class="model-lock-icon" title="Upgrade"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg></span></button>
                  <button class="model-option locked" data-model="nous"><span class="model-option-dot high"></span><span class="model-option-info"><strong>Nous</strong> <span class="model-tier">High</span></span><span class="model-lock-icon" title="Upgrade"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg></span></button>
                </div>
              </div>
            </div>
            <div class="composer-wrapper">
              <textarea class="composer-input" id="composer-input" placeholder="Share your thoughts... Socra will guide your reasoning." rows="1"></textarea>
              <div class="composer-action-row">
                <button class="composer-btn attach-btn" id="workspace-btn" title="Create workspace document"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="12" y1="18" x2="12" y2="12"></line><line x1="9" y1="15" x2="15" y2="15"></line></svg><span>Document</span></button>
                <div class="spacer"></div>
                <button class="composer-btn send-btn" id="send-btn" disabled title="Send"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg></button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
  <!-- Spotlight-style search popup -->
  <div class="spotlight-overlay" id="spotlight-overlay"></div>
  <div class="spotlight-popup" id="spotlight-popup" role="dialog" aria-modal="true" aria-label="Search chats">
    <div class="spotlight-input-row">
      <svg class="spotlight-search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      <input type="text" class="spotlight-input" id="spotlight-input" placeholder="Search chats..." autocomplete="off" spellcheck="false">
      <kbd class="spotlight-kbd">Esc</kbd>
    </div>
    <div class="spotlight-results" id="spotlight-results"></div>
  </div>

  <div class="toast-container" id="toast-container"></div>
  
  <!-- Settings Panel -->
  <div class="settings-overlay" id="settings-overlay"></div>
  <div class="settings-panel" id="settings-panel">
    <div class="settings-header">
      <h2>Settings</h2>
      <button class="settings-close" id="settings-close"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
    </div>
    <div class="settings-content">
      <div class="settings-section">
        <h3>Appearance</h3>
        <div class="settings-row">
          <div class="settings-row-info">
            <span class="settings-row-label">Dark Mode</span>
            <span class="settings-row-desc">Reduce eye strain in low-light environments</span>
          </div>
          <label class="settings-toggle">
            <input type="checkbox" id="dark-mode-toggle">
            <span class="settings-toggle-slider"></span>
          </label>
        </div>
      </div>
      <div class="settings-section">
        <h3>Account</h3>
        <div class="settings-row clickable" id="settings-view-profile">
          <div class="settings-row-info">
            <span class="settings-row-label">View Profile</span>
            <span class="settings-row-desc">See your cognitive portfolio and stats</span>
          </div>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </div>
        <div class="settings-row clickable" id="settings-upgrade">
          <div class="settings-row-info">
            <span class="settings-row-label">Upgrade Plan</span>
            <span class="settings-row-desc">Unlock more features and better models</span>
          </div>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </div>
      </div>
    </div>
  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <!-- highlight.js: syntax highlighting for code blocks (core + common languages bundle).
       Both light + dark themes loaded; JS toggles which is active based on Socra's data-theme. -->
  <link rel="stylesheet" id="hljs-theme" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  <script src="/js/supabase-client.js"></script>
  <script src="/js/ai.js"></script>
  <script src="/js/markdown-editor.js"></script>
  <script src="/js/metrics.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
